<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CF AI Web Coach</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      background: #f6821f;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; color: white; font-weight: 700; }
    header span { font-size: 0.85rem; color: rgba(255,255,255,0.8); }
    .container {
      width: 100%;
      max-width: 800px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 16px;
    }
    #chat-box {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }
    .user {
      background: #f6821f;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .assistant {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #f0f0f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .typing {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      align-self: flex-start;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.9rem;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    #user-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #f0f0f0;
      font-size: 0.95rem;
      outline: none;
    }
    #user-input:focus { border-color: #f6821f; }
    button {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      background: #f6821f;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover { background: #e07010; }
    #clear-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
    }
    #clear-btn:hover { border-color: #f6821f; color: #f6821f; }
    .welcome {
      text-align: center;
      color: #555;
      margin-top: 60px;
    }
    .welcome h2 { font-size: 1.4rem; margin-bottom: 8px; color: #888; }
    .welcome p { font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>⚡ CF AI Web Coach</h1>
      <span>Powered by Cloudflare Workers AI + Llama 3.3</span>
    </div>
  </header>
  <div class="container">
    <div id="chat-box">
      <div class="welcome">
        <h2>Analyze any website's performance</h2>
        <p>Try: "Analyze github.com" or "How can I improve my site's speed?"</p>
      </div>
    </div>
    <div class="input-row">
      <input id="user-input" type="text" placeholder="Ask about web performance..." />
      <button onclick="sendMessage()">Send</button>
      <button id="clear-btn" onclick="clearChat()">Clear</button>
    </div>
  </div>

  <script>
    const API = "https://cf-ai-web-coach.himanshu524.workers.dev";
    const sessionId = "session-" + Math.random().toString(36).slice(2);

    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("user-input");

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    function addMessage(role, text) {
      const welcome = chatBox.querySelector(".welcome");
      if (welcome) welcome.remove();
      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;
      input.value = "";
      addMessage("user", message);

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.textContent = "Analyzing...";
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch(`${API}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, sessionId }),
        });
        const data = await res.json();
        typing.remove();
        addMessage("assistant", data.reply);
      } catch (err) {
        typing.remove();
        addMessage("assistant", "Error connecting to API. Please try again.");
      }
    }

    async function clearChat() {
      await fetch(`${API}/clear`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId }),
      });
      chatBox.innerHTML = `<div class="welcome">
        <h2>Analyze any website's performance</h2>
        <p>Try: "Analyze github.com" or "How can I improve my site's speed?"</p>
      </div>`;
    }
  </script>
</body>
</html>
